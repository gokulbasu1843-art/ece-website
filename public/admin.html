<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#f1f5f9;

}

/* =======================
HEADER
======================= */

header{

background:#0f172a;

padding:18px 7%;

display:flex;

justify-content:space-between;

align-items:center;

color:white;

}

.logo{

font-size:28px;

font-weight:700;

color:#38bdf8;

}

/* =======================
LOGIN BOX
======================= */

.login-page{

width:100%;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.login-box{

background:white;

padding:40px;

width:90%;
max-width:400px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.login-box h2{

text-align:center;

margin-bottom:25px;

}

.login-box input{

width:100%;

padding:14px;

margin-bottom:15px;

border:1px solid #ddd;

border-radius:10px;

}

.login-box button{

width:100%;

padding:14px;

border:none;

background:#38bdf8;

color:white;

font-size:16px;

border-radius:10px;

cursor:pointer;

}

/* =======================
DASHBOARD
======================= */

.dashboard{

display:none;

padding:50px 7%;

}

.card-box{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-bottom:40px;

}

.card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.card h3{

margin-bottom:10px;

}

.card p{

font-size:28px;

font-weight:700;

color:#38bdf8;

}

/* =======================
TABLE
======================= */

.table-box{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

overflow-x:auto;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#38bdf8;

color:white;

}

th,td{

padding:14px;

border:1px solid #ddd;

text-align:center;

}

/* =======================
BUTTON
======================= */

.delete-btn{

background:red;

color:white;

border:none;

padding:8px 15px;

border-radius:8px;

cursor:pointer;

}

.logout-btn{

background:#ef4444;

color:white;

border:none;

padding:10px 20px;

border-radius:10px;

cursor:pointer;

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<div class="logo">

ECE Admin Panel

</div>

<button class="logout-btn"
onclick="logout()">

Logout

</button>

</header>

<!-- LOGIN -->

<div class="login-page"
id="loginPage">

<div class="login-box">

<h2>

Admin Login 🔐

</h2>

<input type="email"
id="adminEmail"
placeholder="Admin Email">

<input type="password"
id="adminPassword"
placeholder="Admin Password">

<button onclick="adminLogin()">

Login

</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard"
id="dashboard">

<div class="card-box">

<div class="card">

<h3>Total Students</h3>

<p id="totalStudents">

0

</p>

</div>

</div>

<div class="table-box">

<h2 style="margin-bottom:20px;">

Registered Students 📚

</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Password</th>

<th>Action</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>

</div>

<script>

// =======================
// ADMIN LOGIN
// =======================

function adminLogin(){

const email =
document.getElementById("adminEmail")
.value;

const password =
document.getElementById("adminPassword")
.value;

if(

email === "admin@ece.com"

&&

password === "eceadmin123"

){

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "block";

loadStudents();

}

else{

alert(
"Invalid Admin Login ❌"
);

}

}

// =======================
// LOAD STUDENTS
// =======================

async function loadStudents(){

const response =
await fetch("/users");

const students =
await response.json();

document.getElementById(
"totalStudents"
).innerText = students.length;

let table =
document.getElementById(
"studentTable"
);

table.innerHTML = "";

students.forEach(student=>{

table.innerHTML += `

<tr>

<td>${student.name}</td>

<td>${student.email}</td>

<td>${student.password}</td>

<td>

<button class="delete-btn">

Delete

</button>

</td>

</tr>

`;

});

}

// =======================
// LOGOUT
// =======================

function logout(){

location.reload();

}

</script>

</body>

</html>
