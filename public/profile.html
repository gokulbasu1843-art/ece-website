<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Profile</title>

<style>

body{

font-family:Arial;
background:#f1f5f9;
padding:40px;

}

.profile{

max-width:500px;
margin:auto;

background:white;
padding:40px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.08);

text-align:center;

}

.profile h1{

margin-bottom:20px;

}

.info{

margin:15px 0;

font-size:18px;

}

.logout{

margin-top:30px;

padding:14px 30px;

border:none;

background:#ef4444;

color:white;

border-radius:10px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="profile">

<h1>
Student Profile 👤
</h1>

<div class="info">
Name:
<span id="profileName"></span>
</div>

<div class="info">
Email:
<span id="profileEmail"></span>
</div>

<button
class="logout"
onclick="logout()">

Logout

</button>
<h2 style="
margin-top:40px;
margin-bottom:20px;">

Your Notes 📚

</h2>

<button
onclick="openCF()"
style="
padding:14px 25px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
cursor:pointer;
margin:10px;">

Computer Fundamentals

</button>

<button
onclick="openEX()"
style="
padding:14px 25px;
border:none;
background:#16a34a;
color:white;
border-radius:10px;
cursor:pointer;
margin:10px;">

Excel Notes

</button>
</div>

<script>

document.getElementById("profileName")
.innerText =
localStorage.getItem("studentName");

document.getElementById("profileEmail")
.innerText =
localStorage.getItem("studentEmail");
  
function openCF(){

window.location.href =
"/notes/cf101.html";

}

function openEX(){

window.location.href =
"/notes/ex202.html";

}
function logout(){

localStorage.clear();

window.location.href = "/";

}

</script>

</body>

</html>
